# ========================================================================
# Slime Markdown Table RL Multi-Node Training Job Configuration
# ========================================================================

jobargs:
  job_name: "slime-markdown-table-grpo-2node"
  image: "iregistry.baidu-int.com/acg-agi/slime:latest"
  num_workers: 1

  model_path: "/mnt/cfs_bj_mt/experiments/zhengmingming/qfocr-annv9-30k-s4-qwen3-4b-v30-new-vocab-0303/iter_0004600_hf"
  train_data: "/mnt/cfs_bj_mt/workspace/zhengmingming/rl_from_zero/slime/data/markdown_table_rl_train.parquet"
  save_path: "/mnt/cfs_bj_mt/workspace/zhengmingming/rl_from_zero/slime/outputs/markdown_table_rl"

modelargs:
  model_name: "internvl-markdown-table"
  gpus_per_node: "8"

trainargs:
  train_backend: "fsdp"
  actor_num_nodes: "2"
  actor_num_gpus_per_node: "8"
  colocate: "true"
  num_rollout: "100"
  rollout_batch_size: "16"
  n_samples_per_prompt: "4"
  rollout_max_response_len: "4096"
  rollout_temperature: "0.7"
  global_batch_size: "64"
  lr: "5.0e-7"
  custom_rm_path: ""
  use_wandb: "true"
  wandb_mode: "offline"
  wandb_project: "internvl-markdown-table-grpo"
  wandb_group: "internvl-markdown-table"
